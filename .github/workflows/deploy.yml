name: CI / CD – Palladium Mall

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 – Tests
  # ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, sqlite, mbstring, exif, pcntl, bcmath, gd, zip, intl, dom, xml, xsl, xmlreader, xmlwriter, simplexml
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Copy .env for testing
        run: cp .env.example .env.testing

      - name: Generate app key
        run: php artisan key:generate --env=testing

      - name: Run Pest tests
        run: php artisan test --parallel

  # ─────────────────────────────────────────────────────────────
  # JOB 2 – Build & Push to Docker Hub (main only)
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Format Image Name
        id: image
        run: |
          FULL_IMAGE="${{ secrets.IMAGE_NAME }}"
          if [[ "$FULL_IMAGE" != *"/"* ]]; then
            FULL_IMAGE="${{ secrets.DOCKER_HUB_USERNAME }}/$FULL_IMAGE"
          fi
          echo "name=$FULL_IMAGE" >> $GITHUB_OUTPUT

      - name: Set short SHA tag
        id: sha
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.sha.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=registry,ref=${{ steps.image.outputs.name }}:buildcache
          cache-to: type=registry,ref=${{ steps.image.outputs.name }}:buildcache,mode=max

      - name: Image pushed summary
        run: |
          echo "✅ Image pushed:"
          echo "   ${{ steps.image.outputs.name }}:${{ steps.sha.outputs.tag }}"
          echo "   ${{ steps.image.outputs.name }}:latest"
          echo ""
          echo "To deploy manually on your VPS:"
          echo "   docker pull ${{ steps.image.outputs.name }}:latest"
          echo "   cd /var/www/palladium_mall"
          echo "   IMAGE_TAG=${{ steps.sha.outputs.tag }} DOCKERHUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }} IMAGE_NAME=palladium_mall docker compose up -d --force-recreate palladium_mall_app"