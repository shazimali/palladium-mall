# =====================================================================
# Palladium Mall - Apache Virtual Host
# =====================================================================

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/palladium_mall/public

    ServerName palladiummall.com
    ServerAlias www.palladiummall.com

    <Directory /var/www/palladium_mall/public>
        AllowOverride All
        Options Indexes FollowSymLinks
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/palladium_mall_error.log
    CustomLog ${APACHE_LOG_DIR}/palladium_mall_access.log combined
</VirtualHost>